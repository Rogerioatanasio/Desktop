<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Projeto Azul</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #486acf, #4069ca);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            text-align: center;
            width: 340px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }

        h1 {
            margin-bottom: 30px;
            color: #325dc9;
        }

        .btn {
            display: block;
            margin: 15px 0;
            padding: 14px;
            text-decoration: none;
            background: #355dc2;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #ff8c00;
            transform: translateY(-2px);
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Projeto Azul</h1>

        <p class="subtitle">
            Conectando profissionais da obra com quem precisa.
        </p>

        <a class="btn" href="/trabalhar">Quero Trabalhar</a>
        <a class="btn" href="/contratar">Quero Contratar</a>
    </div>
</body>
</html>
